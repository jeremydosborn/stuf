name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv7m-none-eabi
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      # ── Format ───────────────────────────────────────────────────────────
      - name: Check formatting
        run: cargo fmt --all -- --check

      # ── Clippy ───────────────────────────────────────────────────────────
      - name: Clippy — stuf-core
        run: cargo clippy -p stuf-core -- -D warnings

      - name: Clippy — stuf-tuf
        run: cargo clippy -p stuf-tuf -- -D warnings

      - name: Clippy — stuf-env
        run: cargo clippy -p stuf-env -- -D warnings

      # ── Tests ────────────────────────────────────────────────────────────
      - name: Test — stuf-core
        run: cargo test -p stuf-core

      - name: Test — stuf-tuf
        run: cargo test -p stuf-tuf

      - name: Test — stuf-env
        run: cargo test -p stuf-env

      # ── Build toaster (cross-compile, no run) ────────────────────────────
      - name: Build toaster (ARM Cortex-M3)
        run: cargo build --release --target thumbv7m-none-eabi -p toaster

      # ── Build publisher ──────────────────────────────────────────────────
      - name: Build publisher
        run: cargo build --release -p publisher
